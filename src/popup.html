<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoomDimmer</title>
  </head>
  <body class="popup-body">
    <main class="popup" aria-label="DoomDimmer quick controls">
      <header class="brand-row">
        <img src="./icons/logo.png" alt="" width="54" height="54">
        <div>
          <h1>DoomDimmer</h1>
          <p>Runs locally. No browsing data leaves your device.</p>
        </div>
        <button class="icon-button" id="settingsButton" type="button" aria-label="Open settings">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"></path><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .58V20a2 2 0 1 1-4 0v-.02a1.7 1.7 0 0 0-1-.58 1.7 1.7 0 0 0-1.88.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.58-1H4a2 2 0 1 1 0-4h.02a1.7 1.7 0 0 0 .58-1 1.7 1.7 0 0 0-.34-1.88l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.58V4a2 2 0 1 1 4 0v.02a1.7 1.7 0 0 0 1 .58 1.7 1.7 0 0 0 1.88-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c.2.34.4.66.58 1H20a2 2 0 1 1 0 4h-.02a1.7 1.7 0 0 0-.58 1Z"></path></svg>
        </button>
      </header>

      <section class="panel" aria-labelledby="current-site-title">
        <p class="panel-label" id="current-site-title">Current site</p>
        <div class="site-row">
          <span class="site-icon" id="siteInitial">D</span>
          <span class="site-host" id="siteHost">Loading...</span>
          <strong id="siteToggleLabel">On</strong>
          <label class="switch" aria-label="Toggle DoomDimmer for current site">
            <input id="siteToggle" type="checkbox">
            <span></span>
          </label>
        </div>
      </section>

      <section class="panel" aria-labelledby="status-title">
        <p class="panel-label" id="status-title">Session status</p>
        <div class="status-row">
          <p class="status-value" id="sessionStatus">Loading</p>
          <span class="status-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"></path><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"></path></svg></span>
        </div>
      </section>

      <section class="panel" aria-labelledby="sensitivity-title">
        <p class="panel-label" id="sensitivity-title">Sensitivity</p>
        <div class="segmented" role="radiogroup" aria-label="Sensitivity">
          <label><input type="radio" name="preset" value="gentle">Gentle</label>
          <label><input type="radio" name="preset" value="balanced">Balanced</label>
          <label><input type="radio" name="preset" value="strict">Strict</label>
          <label><input type="radio" name="preset" value="custom">Custom</label>
        </div>
      </section>

      <div class="action-grid">
        <button class="button" id="pause15" type="button"><svg viewBox="0 0 24 24"><path d="M12 6v6l4 2"></path><path d="M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"></path></svg>Pause 15 min</button>
        <button class="button" id="pause60" type="button"><svg viewBox="0 0 24 24"><path d="M12 6v6l4 2"></path><path d="M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"></path></svg>Pause 1 hour</button>
      </div>

      <button class="button wide-button" id="openSettings" type="button">
        <svg viewBox="0 0 24 24"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"></path><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .58V20a2 2 0 1 1-4 0v-.02a1.7 1.7 0 0 0-1-.58 1.7 1.7 0 0 0-1.88.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.58-1H4a2 2 0 1 1 0-4h.02a1.7 1.7 0 0 0 .58-1 1.7 1.7 0 0 0-.34-1.88l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.58V4a2 2 0 1 1 4 0v.02a1.7 1.7 0 0 0 1 .58 1.7 1.7 0 0 0 1.88-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c.2.34.4.66.58 1H20a2 2 0 1 1 0 4h-.02a1.7 1.7 0 0 0-.58 1Z"></path></svg>
        Open settings
        <svg viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"></path></svg>
      </button>

      <p class="local-note"><svg viewBox="0 0 24 24"><path d="M12 21s7-4.4 7-11V5l-7-3-7 3v5c0 6.6 7 11 7 11Z"></path></svg>Behavior-based, not site blocking</p>
      <p class="status-line" id="saveStatus" aria-live="polite"></p>
    </main>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
